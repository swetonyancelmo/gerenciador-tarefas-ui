<div
  class="group flex items-center gap-4 rounded-xl border border-border bg-surface-card p-4 transition-all duration-200 hover:border-violet-600/30 hover:shadow-lg hover:shadow-purple-950/10"
  [class.opacity-60]="task().completed"
>
  <button
    (click)="onToggle()"
    class="flex h-6 w-6 shrink-0 cursor-pointer items-center justify-center rounded-md border-2 transition-all duration-200"
    [class]="task().completed
      ? 'border-violet-500 bg-violet-600'
      : 'border-gray-600 hover:border-violet-400'"
    [attr.aria-label]="task().completed ? 'Desmarcar tarefa' : 'Marcar como concluída'"
  >
    @if (task().completed) {
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-white" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
      </svg>
    }
  </button>

  <div class="min-w-0 flex-1">
    <h3
      class="text-sm font-semibold transition-all duration-200"
      [class]="task().completed ? 'text-gray-500 line-through' : 'text-white'"
    >
      {{ task().title }}
    </h3>
    @if (task().description) {
      <p
        class="mt-0.5 truncate text-xs transition-all duration-200"
        [class]="task().completed ? 'text-gray-600' : 'text-gray-400'"
      >
        {{ task().description }}
      </p>
    }
  </div>

  <button
    (click)="onRemove()"
    class="shrink-0 cursor-pointer rounded-lg p-2 text-gray-500 opacity-0 transition-all duration-200 hover:bg-red-500/10 hover:text-red-400 group-hover:opacity-100"
    aria-label="Excluir tarefa"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
    </svg>
  </button>
</div>
